name: Release

on:
  push:
    tags:
      - "v*.*.*"

env:
  REGISTRY: ghcr.io

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install test dependencies
        run: pip install -r requirements-test.txt pytest
      - name: Run tests
        run: pytest tests/ -v

  build:
    name: Build & Push (${{ matrix.arch }})
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    strategy:
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
          - arch: aarch64
            platform: linux/arm64
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./frigate_identity_service
          file: ./frigate_identity_service/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/frigate-identity-service-${{ matrix.arch }}:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/frigate-identity-service-${{ matrix.arch }}:latest
          build-args: |
            BUILD_VERSION=${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  manifest:
    name: Create Multi-Arch Manifest
    needs: build
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push manifest (versioned)
        run: |
          docker buildx imagetools create -t \
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/frigate-identity-service:${{ steps.version.outputs.version }} \
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/frigate-identity-service-amd64:${{ steps.version.outputs.version }} \
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/frigate-identity-service-aarch64:${{ steps.version.outputs.version }}

      - name: Create and push manifest (latest)
        run: |
          docker buildx imagetools create -t \
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/frigate-identity-service:latest \
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/frigate-identity-service-amd64:latest \
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/frigate-identity-service-aarch64:latest

  sign-and-sbom:
    name: Sign Images & Generate SBOM
    needs: manifest
    runs-on: ubuntu-latest
    permissions:
      packages: write
      id-token: write  # Required for keyless signing
    steps:
      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Install Syft (for SBOM generation)
        uses: anchore/sbom-action/download-syft@v0

      - name: Sign multi-arch manifest with Cosign (keyless)
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ github.repository_owner }}/frigate-identity-service:${{ steps.version.outputs.version }}
        run: |
          cosign sign --yes ${IMAGE}

      - name: Generate and attach SBOM
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ github.repository_owner }}/frigate-identity-service:${{ steps.version.outputs.version }}
        run: |
          syft ${IMAGE} -o spdx-json > sbom.spdx.json
          cosign attach sbom --sbom sbom.spdx.json ${IMAGE}
          cosign sign --yes --attachment sbom ${IMAGE}

  release:
    name: Create Release
    needs: sign-and-sbom
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build release notes from CHANGELOG
        run: |
          python3 - <<'PY'
          import os
          import re
          import sys
          from pathlib import Path

          tag_version = os.environ.get("GITHUB_REF_NAME", "").removeprefix("v")
          if not tag_version:
              sys.exit("Missing GITHUB_REF_NAME")

          changelog_path = Path("CHANGELOG.md")
          text = changelog_path.read_text(encoding="utf-8")
          pattern = re.compile(
              rf"^## \[{re.escape(tag_version)}\][^\n]*\n(.*?)(?=^## \[|\Z)",
              flags=re.MULTILINE | re.DOTALL,
          )
          match = pattern.search(text)
          if not match:
              sys.exit(f"Could not find CHANGELOG section for version {tag_version}")

          body = match.group(1).strip()
          if not body:
              body = "- No notable changes documented."

          release_notes = Path("release_notes.md")
          release_notes.write_text(body + "\n", encoding="utf-8")
          print(f"Wrote release notes for v{tag_version} to {release_notes}")
          PY

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
          draft: false
          prerelease: false
