name: "Frigate Identity Service"
version: "0.4.6"
slug: "frigate_identity_service"
description: "Person re-identification service for Frigate NVR. Maintains identity continuity using ReID when faces are not visible. GPU acceleration is not required."
url: "https://github.com/awayman/frigate_identity_service"
image: "ghcr.io/awayman/frigate-identity-service-{arch}"
arch:
  - amd64
  - aarch64
startup: services
boot: auto
options:
  mqtt_broker: "core-mosquitto"
  mqtt_port: 1883
  mqtt_username: ""
  mqtt_password: ""
  frigate_host: "http://homeassistant.local:5000"
  reid_model: "osnet_x1_0"
  reid_device: "cpu"
  reid_similarity_threshold: 0.6
  embeddings_db_path: "/data/embeddings.json"
  snapshot_correlation_window: 2.0
  max_tracked_persons_per_camera: 3
  debug_logging_enabled: false
  debug_log_path: "/data/debug"
  debug_save_embeddings: false
  debug_retention_days: 7
schema:
  mqtt_broker: str
  mqtt_port: int
  mqtt_username: str?
  mqtt_password: str?
  frigate_host: str
  reid_model: str
  reid_device: str
  reid_similarity_threshold: float
  embeddings_db_path: str
  snapshot_correlation_window: float
  max_tracked_persons_per_camera: int
  debug_logging_enabled: bool
  debug_log_path: str
  debug_save_embeddings: bool
  debug_retention_days: int
environment:
  MQTT_BROKER: mqtt_broker
  MQTT_PORT: mqtt_port
  MQTT_USERNAME: mqtt_username
  MQTT_PASSWORD: mqtt_password
  FRIGATE_HOST: frigate_host
  REID_MODEL: reid_model
  REID_DEVICE: reid_device
  REID_SIMILARITY_THRESHOLD: reid_similarity_threshold
  EMBEDDINGS_DB_PATH: embeddings_db_path
  SNAPSHOT_CORRELATION_WINDOW: snapshot_correlation_window
  MAX_TRACKED_PERSONS_PER_CAMERA: max_tracked_persons_per_camera
  DEBUG_LOGGING_ENABLED: debug_logging_enabled
  DEBUG_LOG_PATH: debug_log_path
  DEBUG_SAVE_EMBEDDINGS: debug_save_embeddings
  DEBUG_RETENTION_DAYS: debug_retention_days
map:
  - data:rw
