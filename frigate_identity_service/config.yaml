name: "Frigate Identity Service"
version: "0.7.2"
slug: "frigate_identity_service"
description: "Person re-identification service for Frigate NVR. Maintains identity continuity using ReID when faces are not visible. GPU acceleration is not required."
url: "https://github.com/awayman/frigate_identity_service"
image: "ghcr.io/awayman/frigate-identity-service-{arch}"
arch:
  - amd64
  - aarch64
startup: services
boot: auto
options:
  mqtt_broker: "core-mosquitto"
  mqtt_port: 1883
  mqtt_username: ""
  mqtt_password: ""
  frigate_host: "http://homeassistant.local:5000"
  min_person_detection_confidence: 0.80
  reid_model: "osnet_x1_0"
  reid_device: "cpu"
  reid_similarity_threshold: 0.75
  embeddings_db_path: "/data/embeddings.json"
  embedding_retention_mode: "age_prune"
  embedding_max_age_hours: 48
  embedding_prune_interval_minutes: 30
  embedding_full_clear_time: "00:00"
  recency_decay_mode: "linear"
  recency_weight_floor: 0.3
  use_confidence_weighting: false
  snapshot_fetch_mode: "clean_if_available"
  snapshot_local_crop: true
  snapshot_reid_jpeg_quality: 85
  snapshot_display_jpeg_quality: 85
  snapshot_crop_padding_x: 0.05
  snapshot_crop_padding_y: 0.20
  # DEPRECATED: The following two settings are only used when PUBLISH_IDENTITY_EVENT_SNAPSHOT=false (legacy MQTT display path).
  # This mode is deprecated and will be removed in a future release.
  # Snapshot attribution via MQTT temporal correlation is unreliable for multi-person scenarios.
  # Recommended: Use PUBLISH_IDENTITY_EVENT_SNAPSHOT=true (default) for per-event API-based snapshots.
  snapshot_correlation_window: 2.0
  snapshot_fallback_max_age: 30.0
  # DEPRECATED mode option: Set to false to enable legacy MQTT display path (frigate/+/person/snapshot subscription).
  # Default true uses Frigate HTTP API for per-event snapshot publishing (RECOMMENDED).
  # Legacy mode will be removed in a future release.
  publish_identity_event_snapshot: true
  max_tracked_persons_per_camera: 3
  debug_logging_enabled: false
  debug_log_path: "/data/debug"
  debug_save_embeddings: false
  debug_retention_days: 7
schema:
  mqtt_broker: str
  mqtt_port: port
  mqtt_username: str?
  mqtt_password: password?
  frigate_host: url
  min_person_detection_confidence: float(0.0,1.0)
  reid_model: str
  reid_device: str
  reid_similarity_threshold: float(0.0,1.0)
  embeddings_db_path: str
  embedding_retention_mode: str
  embedding_max_age_hours: int(1,720)
  embedding_prune_interval_minutes: int(1,1440)
  embedding_full_clear_time: str
  recency_decay_mode: str
  recency_weight_floor: float(0.0,0.9)
  use_confidence_weighting: bool
  snapshot_fetch_mode: str
  snapshot_local_crop: bool
  snapshot_reid_jpeg_quality: int(1,95)
  snapshot_display_jpeg_quality: int(1,95)
  snapshot_crop_padding_x: float(0.0,1.0)
  snapshot_crop_padding_y: float(0.0,1.0)
  snapshot_correlation_window: float(0.1,10.0)
  snapshot_fallback_max_age: float(1.0,3600.0)
  publish_identity_event_snapshot: bool
  max_tracked_persons_per_camera: int(1,20)
  debug_logging_enabled: bool
  debug_log_path: str
  debug_save_embeddings: bool
  debug_retention_days: int(1,90)
map:
  - data:rw
