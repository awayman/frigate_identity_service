addon: true
class: custom
description: 'Custom Identity Service with Deep Learning Person Re-ID'
dependencies:
  - frigate
start:
  - python3 identity_service.py
stop:
  - killall python3
mqtt:
  sensor:
    - name: "Last Person Recognized (Face)"
      state_topic: "identity/person/recognized"
      value_template: "{{ value_json.person_id }}"
      json_attributes_topic: "identity/person/recognized"
    - name: "Last Person Tracked (Re-ID)"
      state_topic: "identity/person/tracked"
      value_template: "{{ value_json.person_id }}"
      json_attributes_topic: "identity/person/tracked"
environment:
  MQTT_BROKER: "localhost"
  MQTT_PORT: "1883"
  REID_MODEL: "osnet_x1_0"
  REID_DEVICE: "auto"
  REID_SIMILARITY_THRESHOLD: "0.75"
  SNAPSHOT_REID_JPEG_QUALITY: "85"
  SNAPSHOT_DISPLAY_JPEG_QUALITY: "85"
  EMBEDDINGS_DB_PATH: "/data/embeddings.json"
  DEBUG_LOGGING_ENABLED: "false"
  DEBUG_LOG_PATH: "/data/debug"
  DEBUG_SAVE_EMBEDDINGS: "false"
  DEBUG_RETENTION_DAYS: "7"
options:
  mqtt_broker: "localhost"
  mqtt_port: 1883
  reid_model: "osnet_x1_0"
  reid_device: "auto"
  reid_similarity_threshold: 0.75
  snapshot_reid_jpeg_quality: 85
  snapshot_display_jpeg_quality: 85
  embeddings_db_path: "/data/embeddings.json"
  debug_logging_enabled: false
  debug_log_path: "/data/debug"
  debug_save_embeddings: false
  debug_retention_days: 7
